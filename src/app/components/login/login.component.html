<div style="max-width: 400px; margin: 100px auto; padding: 20px; border: 1px solid #ccc; border-radius: 5px;">
  <h2>Login</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
    <div style="margin-bottom: 15px;">
      <label for="name" style="display: block; margin-bottom: 5px;">Name:</label>
      <input id="name" type="text" formControlName="name" style="width: 100%; padding: 8px; box-sizing: border-box;">
      <div *ngIf="loginForm.get('name')?.invalid && loginForm.get('name')?.touched" style="color: red; font-size: 12px;">Name is required</div>
    </div>

    <div style="margin-bottom: 15px;">
      <label for="email" style="display: block; margin-bottom: 5px;">Email:</label>
      <input id="email" type="email" formControlName="email" style="width: 100%; padding: 8px; box-sizing: border-box;">
      <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" style="color: red; font-size: 12px;">Valid email is required</div>
    </div>

    <div style="margin-bottom: 15px;">
      <label for="password" style="display: block; margin-bottom: 5px;">Password:</label>
      <input id="password" type="password" formControlName="password" style="width: 100%; padding: 8px; box-sizing: border-box;">
      <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" style="color: red; font-size: 12px;">Password is required</div>
    </div>

    <button type="submit" [disabled]="loginForm.invalid" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">
      Login
    </button>
  </form>
</div>
