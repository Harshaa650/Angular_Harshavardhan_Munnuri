<div style="padding: 20px;">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2>Dashboard</h2>
    <button (click)="logout()" style="padding: 8px 15px; background-color: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer;">Logout</button>
  </div>

  <div style="margin-bottom: 20px;">
    <input type="text" [value]="searchTerm" (input)="onSearch($event.target.value)" placeholder="Search by username or ID" style="padding: 8px; width: 300px; border: 1px solid #ddd; border-radius: 5px;">
    <span *ngIf="searching" style="margin-left: 10px; color: #666; font-size: 12px;">Searching...</span>
  </div>

  <div *ngIf="loading" style="text-align: center; color: #666; padding: 20px;">
    <p>Loading users...</p>
    <p style="font-size: 12px; margin-top: 10px;">This may take a few seconds on first load</p>
  </div>

  <div *ngIf="error" style="color: red; margin-bottom: 20px; padding: 15px; background-color: #ffe6e6; border-radius: 5px;">
    <p>{{ error }}</p>
    <button (click)="retry()" style="padding: 8px 15px; background-color: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px;">Try Again</button>
  </div>

  <div *ngIf="!loading && filteredUsers.length === 0" style="text-align: center; color: #666;">
    No users found
  </div>

  <table *ngIf="!loading && filteredUsers.length > 0" style="width: 100%; border-collapse: collapse; margin-top: 20px;">
    <thead>
      <tr style="background-color: #f5f5f5; border-bottom: 2px solid #ddd;">
        <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Name</th>
        <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Email</th>
        <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">Phone</th>
        <th style="padding: 12px; text-align: left; border: 1px solid #ddd;">City</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of filteredUsers" style="border-bottom: 1px solid #ddd;">
        <td style="padding: 12px; border: 1px solid #ddd;">{{ user.name }}</td>
        <td style="padding: 12px; border: 1px solid #ddd;">{{ user.email }}</td>
        <td style="padding: 12px; border: 1px solid #ddd;">{{ user.phone }}</td>
        <td style="padding: 12px; border: 1px solid #ddd;">{{ user.address.city }}</td>
      </tr>
    </tbody>
  </table>
</div>
